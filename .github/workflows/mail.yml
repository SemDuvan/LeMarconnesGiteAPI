# Bestand: .github/workflows/send-mail.yml
name: Send Email

# Wanneer deze workflow wordt uitgevoerd
on:
  push:       # bij elke push naar de repo
    branches:
      - master

jobs:
  send-mail:
    runs-on: ubuntu-latest

    steps:
      - name: Send mailer
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587

          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}

          subject: Test mail van GitHub Actions
          body: Gekke shit

          to: 2403737duvan@zuyd.nl
          from: pietjepuk0968@gmail.com
